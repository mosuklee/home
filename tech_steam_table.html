<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM TABLE</title>
    <script charset="utf-8" src="./js/neutriumJS.thermo.IAPWS97.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic','맑은 고딕',Arial,sans-serif;
            font-size: 13px;
            line-height: 1.7;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #222;
        }
        .container {
            max-width: 960px;
            margin: 30px auto;
            background: #fff;
            padding: 48px 60px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            border-radius: 4px;
        }
        h1 { font-size: 22px; font-weight: bold; border-bottom: 3px solid #2bab0d; padding-bottom: 8px; color: #2bab0d; margin-top: 0; }
        h2 { font-size: 17px; color: #2bab0d; border-left: 8px solid #2bab0d; padding-left: 10px; margin-top: 36px; margin-bottom: 10px; }
        h3 { font-size: 15px; color: #2bab0d; border-left: 8px solid #2bab0d; padding-left: 10px; margin-top: 28px; }
        h4 { font-size: 13px; color: #333; border-left: 4px solid #a8f197; padding-left: 10px; margin-top: 14px; }
        table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 12px; }
        th { background: #a8f197; text-align: center; padding: 7px 10px; border: 1px solid #2bab0d; }
        td { padding: 6px 10px; border: 1px solid #2bab0d; vertical-align: top; }
        hr { border: none; border-top: 2px solid #2bab0d; margin: 36px 0 10px; }
        .foot-link { text-align: right; font-size: 12px; margin-top: 4px; }
        a { color: #2bab0d; text-decoration: none; }
        img { max-width: 100%; height: auto; display: block; margin: 10px auto; }
        input, select, button { font-family: 'Malgun Gothic','맑은 고딕',Arial,sans-serif; font-size: 13px; }
        button { background: #2bab0d; color: #fff; border: none; padding: 6px 18px; border-radius: 3px; cursor: pointer; margin: 8px 2px; }
        button:hover { background: #1e8a09; }
        @media (max-width: 700px) { .container { padding: 18px 8px; } }
        @media print { body { background: #fff; } .container { box-shadow: none; } }    </style>
</head>
<body>
    <div class="container">

            <h1>STEAM TABLE (IAPWS97)</h1>
            <br>
            <h3>INPUT PROPERTY</h3>
            <table>
                <tr height="40">
                    <th align="center" width="350">Property</th>
                    <th align="center" width="350">Value</th>
                    <th align="center" width="350">Remarks</th>
                </tr>
                <tr>
                    <td>Pressure (kg/cm2.a)</td>
                    <td align="center"><input style="width:80px; text-align:center" type="text" id="input_w_s_p" input
                            value="">
                    </td>
                    <td></td>
                </tr>

                <tr>
                    <td>Temperature (℃)</td>
                    <td align="center"><input style="width:80px; text-align:center" type="text" id="input_w_s_t" input
                            value="">
                    </td>
                    <td></td>
                </tr>
            </table>

            <button onclick="calculate_water_superheated()"> Calculation </button>

            <br><br>
            <h3>OUTPUT PROPERTY</h3>
            <table>
                <tr height="40">
                    <th align="center" width="350">Property</th>
                    <th align="center" width="280">Liquid</th>
                    <th align="center" width="280">Vapor</th>
                    <th align="center" width="280">Remarks</th>
                </tr>
                <tr>
                    <td>Pressure (kg/cm2.a)</td>
                    <td align="center" id="result_w_s_p"></td>
                    <td align="center" id="result_v_s_p"></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Temperature (℃)</td>
                    <td align="center" id="result_w_s_t"></td>
                    <td align="center" id="result_v_s_t"></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Specific enthalpy (kcal/kg)</td>
                    <td align="center" id="result_w_s_h"></td>
                    <td align="center" id="result_v_s_h"></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Specific entropy (kcal/kg.℃)</td>
                    <td align="center" id="result_w_s_s"></td>
                    <td align="center" id="result_v_s_s"></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Specific volume (m3/kg)</td>
                    <td align="center" id="result_w_s_v"></td>
                    <td align="center" id="result_v_s_v"></td>
                    <td></td>
                </tr>

            </table>
            <br>
            <br>
        <hr>
        <div class="foot-link"><a href="chatt_tech.html" target="pages">>> Dicuss with Me for Technical</a></div>
    </div>

    <script>


        function calculate_water_superheated() {

            var input_p;
            var input_t;
            var input_h;
            var input_s;
            var input_v;
            var result_w_s;
            var result_w_s_p;
            var result_w_s_t;
            var result_w_s_h;
            var result_w_s_s;
            var result_w_s_v;

            var result_v_s;
            var result_v_s_p;
            var result_v_s_t;
            var result_v_s_h;
            var result_v_s_s;
            var result_v_s_v;

            document.getElementById("result_w_s_p").innerHTML = "";
            document.getElementById("result_w_s_t").innerHTML = "";
            document.getElementById("result_w_s_h").innerHTML = "";
            document.getElementById("result_w_s_s").innerHTML = "";
            document.getElementById("result_w_s_v").innerHTML = "";

            document.getElementById("result_v_s_p").innerHTML = "";
            document.getElementById("result_v_s_t").innerHTML = "";
            document.getElementById("result_v_s_h").innerHTML = "";
            document.getElementById("result_v_s_s").innerHTML = "";
            document.getElementById("result_v_s_v").innerHTML = "";

            // input 상자에서 data 가져오기
            input_w_s_p = parseFloat(document.getElementById("input_w_s_p").value);
            input_w_s_t = parseFloat(document.getElementById("input_w_s_t").value);

            if (!isNaN(input_w_s_p) & input_w_s_t > 0) {
                input_w_s_t = input_w_s_t + 273.15;
                input_w_s_p = input_w_s_p * 0.0980665;
            } else {
                input_w_s_p = input_w_s_p * 0.0980665;
                input_w_s_t = NeutriumJS.thermo.IAPWS97.PT.r4_P_Tsat(input_w_s_p);
                input_w_s_t_index = NeutriumJS.thermo.IAPWS97.PT.r4_P_Tsat(input_w_s_p)-273.15;
            }

            // 스팀 상태값 계산
            result_w_s = NeutriumJS.thermo.IAPWS97.PT.solve(input_w_s_p, input_w_s_t - 0.000000000001);
            result_v_s = NeutriumJS.thermo.IAPWS97.PT.solve(input_w_s_p, input_w_s_t + 0.000000000001);

            // 스팀 상태값의 Object 추출(h: 엔탈피, s : 엔트로피, v : 비체적)
            result_w_s_p = result_w_s.p / 0.0980665;
            result_w_s_t = result_w_s.t - 273.15;
            result_w_s_h = result_w_s.h / 4.184;
            result_w_s_s = result_w_s.s / 4.184;
            result_w_s_v = result_w_s.v;

            result_v_s_p = result_v_s.p / 0.0980665;
            result_v_s_t = result_v_s.t - 273.15;
            result_v_s_h = result_v_s.h / 4.184;
            result_v_s_s = result_v_s.s / 4.184;
            result_v_s_v = result_v_s.v;

            // 계산된 결과를 web에 뿌리기
            if (input_w_s_t_index.toFixed(2) == result_v_s_t.toFixed(2)) {
                document.getElementById("result_w_s_p").innerHTML = result_w_s_p.toFixed(2);
                document.getElementById("result_w_s_t").innerHTML = result_w_s_t.toFixed(2);
                document.getElementById("result_w_s_h").innerHTML = result_w_s_h.toFixed(2);
                document.getElementById("result_w_s_s").innerHTML = result_w_s_s.toFixed(2);
                document.getElementById("result_w_s_v").innerHTML = result_w_s_v.toFixed(5);
            }            
                document.getElementById("result_v_s_p").innerHTML = result_v_s_p.toFixed(2);
                document.getElementById("result_v_s_t").innerHTML = result_v_s_t.toFixed(2);
                document.getElementById("result_v_s_h").innerHTML = result_v_s_h.toFixed(2);
                document.getElementById("result_v_s_s").innerHTML = result_v_s_s.toFixed(2);
                document.getElementById("result_v_s_v").innerHTML = result_v_s_v.toFixed(5);
        }

    
    </script>
</body>
</html>
