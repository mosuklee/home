<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표준산소농도 환산</title>
    <style>
        body {
            font-family: 'Malgun Gothic','맑은 고딕',Arial,sans-serif;
            font-size: 13px;
            line-height: 1.7;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #222;
        }
        .container {
            max-width: 960px;
            margin: 30px auto;
            background: #fff;
            padding: 48px 60px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            border-radius: 4px;
        }
        h1 { font-size: 22px; font-weight: bold; border-bottom: 3px solid #2bab0d; padding-bottom: 8px; color: #2bab0d; margin-top: 0; }
        h2 { font-size: 17px; color: #2bab0d; border-left: 8px solid #2bab0d; padding-left: 10px; margin-top: 36px; margin-bottom: 10px; }
        h3 { font-size: 15px; color: #2bab0d; border-left: 8px solid #2bab0d; padding-left: 10px; margin-top: 28px; }
        h4 { font-size: 13px; color: #333; border-left: 4px solid #a8f197; padding-left: 10px; margin-top: 14px; }
        table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 12px; }
        th { background: #a8f197; text-align: center; padding: 7px 10px; border: 1px solid #2bab0d; }
        td { padding: 6px 10px; border: 1px solid #2bab0d; vertical-align: top; }
        hr { border: none; border-top: 2px solid #2bab0d; margin: 36px 0 10px; }
        .foot-link { text-align: right; font-size: 12px; margin-top: 4px; }
        a { color: #2bab0d; text-decoration: none; }
        img { max-width: 100%; height: auto; display: block; margin: 10px auto; }
        input, select, button { font-family: 'Malgun Gothic','맑은 고딕',Arial,sans-serif; font-size: 13px; }
        button { background: #2bab0d; color: #fff; border: none; padding: 6px 18px; border-radius: 3px; cursor: pointer; margin: 8px 2px; }
        button:hover { background: #1e8a09; }
        @media (max-width: 700px) { .container { padding: 18px 8px; } }
        @media print { body { background: #fff; } .container { box-shadow: none; } }    </style>
</head>
<body>
    <div class="container">
        <h1>표준 산소농도 환산</h1>

            <div style="padding : 3%">
                <h3>표준 산소농도 환산 수식</h3>
                <table>
                    <tr>
                        <td align="center" class="item_name" width="100px">
                            수 식
                        </td>
                        <td width="800px">
                            환산농도(ppm) = 실제농도(ppm) x [(21-Os)/(21-Oa)]
                        </td>
                    </tr>
                    <tr>
                        <td align="center" class="item_name">
                            참고
                        </td>
                        <td>
                            Os : 표준산소농도(%); &nbsp; &nbsp; &nbsp; &nbsp;
                            Oa : 실제산소농도(%); <br> <br>
                            * 표준산소농도 <br>
                            &nbsp; 일반보일러 : 4%,&nbsp;&nbsp; 폐기물관련설비 : 12%,&nbsp;&nbsp; 발전설비 : 15%
                        </td>
                    </tr>
                </table>
                <br>
                <br>
                <h3>표준 산소농도 환산</h3>
                <table>
                    <tr>
                        <td align="center" class="item_name" width="200px">
                            농도 측정값
                        </td>
                        <td align="center">
                            가스농도(ppm) : <input style="width:5vw; height:1vw; text-align:center" type="text" id="gas_ppm">
                            &nbsp; &nbsp; &nbsp; &nbsp;
                            산소농도(%) : <input style="width:5vw;height:1vw; text-align:center" type="text" id="Oa">
                        </td>
                    </tr>
                    <tr>
                        <td align="center" class="item_name" width="200px">
                            표준산소농도 (%)
                        </td>
                        <td width="800px">
                            &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp;<input style="width:5vw;height:1vw; text-align:center" input
                                value="12" type="text" id="Os">
                        </td>
                    </tr>
                </table>

                <!-- 계산 Button 추가 -->

                <button onclick="calculate()" style="width:9.5vw"> CALCULATION </button>
                <br>
                <br>
                <table>
                    <tr>
                        <td align="center" class="item_name" width="200px">
                            환산농도 (ppm)
                        </td>
                        <td width="800px" id="gas_ppm_std">
                            None
                        </td>
                    </tr>
                </table>
            </div>
        <hr>
        <div class="foot-link"><a href="chatt_tech.html" target="pages">>> Dicuss with Me for Technical</a></div>
    </div>

    <script>


        // 전역변수 정의
        var Os;
        var Oa;
        var gas_ppm;
        var gas_ppm_std;

        // 첫번째 버튼 프로그램

        function calculate() {
            // 계산 수식 
            // gas_ppm_std = gas_ppm * ((21-Os)/(21-Oa))

            // Id Tag를 이용하여 값을 가져와 변수에 입력하기
            var Os = parseFloat(document.getElementById("Os").value);
            var Oa = parseFloat(document.getElementById("Oa").value);
            var gas_ppm = parseFloat(document.getElementById("gas_ppm").value);

            // 위의 계산수식 계산하기
            var gas_ppm_std = gas_ppm * ((21.0 - Os) / (21.0 - Oa))

            // 입력이 완료되었으면(gas_ppm_std 값이 에러없이 값이 생성되면)
            if (!isNaN(gas_ppm_std)) {
                // 계산된 값을 OutPut입력창에 입력
                document.getElementById("gas_ppm_std").innerHTML = gas_ppm_std.toFixed(2);
            }
        }
    
    </script>
</body>
</html>
