<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <style>
        body {
            font-size: 3rem;
        }

        h1 {
            background: #fff000;
        }

        .ilbuni {
            display: inline-block;
            list-style: none;
        }

        .ilbuni img {
            width: 100px;
        }

        .link-google {
            color: red;
        }

        .special {
            background: pink;
        }

        .menu {
            display: flex;
        }

        .menu-link {
            margin: .1em;
            padding: .3em;
            color: #fff;
            text-decoration: none;
            background: dodgerblue;
            list-style: none;
        }

        .menu-active {
            background: orange;
        }

        .menu {
            background: yellowgreen;
        }
    </style>
    <script>
// 페이지가 로드된후 함수 실행하는 방법

// window.onload = function () {    // 전체 문서가 load가 되면 함수를 실행해 주세요
        //     var title = document.getElementById('main-title');
        //     console.log(title);
        // }

        // window.addEventListener('load', function () {     // 전체 페이지가 losd될때까지 기다린다. (시간이 오래걸림)
        //     var title = document.getElementById('main-title');
        //     console.log(title);
        // });

        // window.addEventListener('DOMContentLoaded', function () {  // DOM의 Content가 Load될때까지 기다린다. (시간이 많이 걸리지 않는다.)
        //     var title = document.getElementById('main-title');
        //     console.log(title);
        // });


    </script>
</head>

<body>
    <h1 id="main-title">
        <span>hello 0</span>
        <span>hello 1</span>
        <span>hello 2</span>
        DOM Document Object Model
        <small>small</small>
    </h1>
    <article>
        <header class="main-header">header</header>
        <section>
            <header>s header</header>
            section 1
        </section>
        <section>
            <header>s header</header>
            section 2
        </section>
    </article>

    <ul class="ilbuni-mom">
        <li class="ilbuni">
            <img src="image/ara_start.jpg">
            <a class="link-google" href="https://goole.com">Google</a>
        </li>
        <li class="ilbuni"><img src="image/ara_sea.jpg"></li>
        <li class="ilbuni"><img src="image/ara_ship.jpg"></li>

        <button class='btn'>클릭하세요!</button>
    </ul>

    <nav class="menu">
        <a href="#" class="menu-link" data-menu="1">menu 1</a>
        <a href="#" class="menu-link" data-menu="2">menu 2</a>
        <a href="#" class="menu-link" data-menu="3">menu 3</a>
    </nav>


    <script>
        let title = document.getElementById('main-title');
        let titleSpan = title.getElementsByTagName('span');
        console.log(titleSpan[0]);
        console.log(titleSpan[1]);
        console.log(titleSpan[2]);

        // 요즘에 많이 쓰는 DOM
        // querySelector는 여러개가 있더라도 맨 마지막 한개만 가져온다.
        let mainTitle = document.querySelector('#main-title');
        console.log(mainTitle);
        let mainTitle1 = document.querySelector('#main-title small');
        console.log(mainTitle1);
        let ilbuni = document.querySelector('.ilbuni');
        console.log(ilbuni);

        // querySelectorAll은 해당되는 모든것을 배열로 나타냄
        let ilbunis = document.querySelectorAll('.ilbuni');
        console.log(ilbunis);
        let ilbunis1 = document.querySelectorAll('.ilbuni');
        console.log(ilbunis1[1]);

        // Border를 추가
        ilbunis1[0].style.border = '1px solid red'
        ilbunis1[1].style.border = '1px solid red'
        ilbunis1[2].style.border = '1px solid red'

        for (i = 0; i < ilbunis1.length; i++) {
            ilbunis1[i].style.border = '1px solid red';
        }

        // 어떤 속성의 값을 세팅해 주거나 얻어오는것
        let link = document.querySelector('.ilbuni a');
        console.log(link);
        // 속성가져오기
        link = document.querySelector('.ilbuni a');
        console.log(link.getAttribute('href'));

        link = document.querySelector('.ilbuni a');
        console.log(link.getAttribute('class'));

        // Setting을 할 수 도 있다.
        link = document.querySelector('.ilbuni a');
        console.log(link.getAttribute('href'));
        link.setAttribute('href', 'https://naver.com');
        console.log(link.getAttribute('href'));

        // class를 넣고 빼기
        link = document.querySelector('.ilbuni a');
        link.className = 'special link-google';

        // 기존의 것을 그대로 두고 Class만 추가할 경우(대부분 이기능 사용)
        link = document.querySelector('.ilbuni a');
        link.classList.add('special');

        // 지울경우에는 remove할수를 쓴다.
        link = document.querySelector('.ilbuni a');
        link.classList.add('special');
        // 2초후에 함수 실행
        setTimeout(function () {
            link.classList.remove('link-google');
        }, 2000)

        // 여러개의 class를 동시에 넣을 때 쉼표를 구분하여 입력한다. remove도 동일함
        link = document.querySelector('.ilbuni a');
        link.classList.add('special', 'foo');

        // 해당 class를 가지고 있으면 true, 없으면 false
        console.log(link.classList.contains('special'))

        // Java만을 이용하여 Html을 입력한다.
        let ilbuniMom = document.querySelector('.ilbuni-mom');
        let listElem = document.createElement('li');
        listElem.innerHTML = '<span>일분이</span>';
        ilbuniMom.appendChild(listElem)

        // Event
        // 클릭하면 title이 색갈이 파단색으로 변하게 하기
        let btn = document.querySelector('.btn');
        mainTitle = document.querySelector('#main-title');

        function btnClickHandler() {
            mainTitle.style.background = "dodgerblue";
        }

        btn.addEventListener('click', btnClickHandler);
        // 여러 함수를 여기에 입력한다.
        // 그러나 아래의 기능은
        // 위와 같은 기능인데 할수있는게 하나밖에 없어 잘 사용하지 않는다.
        // 클릭되었을때 함수를 하나밖에 실행를 시키지 못한다.
        btn.onclick = btnClickHandler;


        // 현재 활성화된 메뉴를 담을 변수
        // 일반적인 방법
        let currentMenu;
        let menuLinks = document.querySelectorAll('.menu-link');
        function clickMenuHandler() {
            // console.log('click!');
            if (currentMenu) {
                currentMenu.classList.remove('menu-active');
            }
            this.classList.add('menu-active');  // this는 addEventListener가 호출한 아이를 나타낸다.
            currentMenu = this;
        }

        // for (let i = 0; i < menuLinks.length; i++) {
        //     menuLinks[i].addEventListener('click', clickMenuHandler);
        // }

        // 더 좋은 방법 (이벤트 위임)
        currentMenu;
        let menu = document.querySelector('.menu');
        function clickHandler(e) {
            if (currentMenu) {
                currentMenu.classList.remove('menu-active');
            }
            e.target.classList.add('menu-active');
            currentMenu = e.target;
        }

        menu.addEventListener('click', clickHandler);


    </script>

</body>

</html>
